name: sql_practice_app
description: SQL Query Practice App - MVVM + Riverpod

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  google_fonts: ^6.2.1
  flutter_syntax_view: ^4.0.0
  gap: ^3.0.1
  shared_preferences: ^2.2.3
  collection: ^1.18.0
  path: ^1.9.0
  http: ^1.6.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
